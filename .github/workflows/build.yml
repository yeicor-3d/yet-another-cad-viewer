on:
  push:
  pull_request:
  workflow_call:
    inputs:
      ref:
        type: "string"
        required: true
        description: "The ref (branch or tag) to build"

jobs:
  build-frontend:
    name: "Build frontend"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
        with:
          ref: "${{ inputs.ref }}"
      - uses: "actions/setup-node@v6"
        with:
          node-version: "lts/*"
          check-latest: true
          cache: "yarn"
      - run: "yarn install --dev"
      - run: "yarn build"
      - uses: "actions/upload-artifact@v7"
        with:
          name: "frontend"
          path: "dist"
          retention-days: 5

  build-backend:
    name: "Build backend"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
        with:
          ref: "${{ inputs.ref }}"
      - uses: "astral-sh/setup-uv@v7"
      - run: "YACV_SKIP_FRONTEND_BUILD=true uv build --wheel"
        env:
          YACV_SKIP_FRONTEND_BUILD: "true" # Ensure the frontend build is skipped
      - uses: "actions/upload-artifact@v7"
        with:
          name: "wheel"
          path: "dist/*.whl"
          retention-days: 5

  build-logo:
    name: "Build logo"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
        with:
          ref: "${{ inputs.ref }}"
      - uses: "astral-sh/setup-uv@v7"
      - run: "uv run python yacv_server/logo.py"
        env:
          YACV_SKIP_FRONTEND_BUILD: "true" # Ensure the frontend build is skipped
      - uses: "actions/upload-artifact@v7"
        with:
          name: "logo"
          path: "assets/logo_build"
          retention-days: 5

  build-example:
    name: "Build example"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
        with:
          ref: "${{ inputs.ref }}"
      - uses: "astral-sh/setup-uv@v7"
      - run: "uv run python example/object.py"
        env:
          YACV_SKIP_FRONTEND_BUILD: "true" # Ensure the frontend build is skipped
          YACV_DISABLE_SERVER: "true" # Ensure the server is not started during the example build
      - uses: "actions/upload-artifact@v7"
        with:
          name: "example"
          path: "export"
          retention-days: 5
